<div class="pt-tab-shell">

  <!-- Sidebar nav -->
  <nav class="pt-tab-nav">
    <span class="pt-nav-label">Configuration</span>
    <button type="button" class="pt-nav-item pt-nav-active">
      <span class="pt-nav-num">1</span>
      <span class="pt-nav-text">General</span>
    </button>
  </nav>

  <!-- Content panels -->
  <div class="pt-tab-content">
    <div class="pt-tab-pane pt-tab-active">
      <form [formGroup]="boxTemplateForm" (ngSubmit)="onBoxFormSubmit()">

        <div class="gen-grid">

          <div class="gen-field">
            <label class="gen-label">Title</label>
            <input type="text" formControlName="labelName" class="gen-input">
          </div>

          <div class="gen-field">
            <label class="gen-label">Title FontSize</label>
            <input type="number" formControlName="labelFontSize" class="gen-input">
          </div>

          <div class="gen-field">
            <label class="gen-label">Title FontColor</label>
            <div class="gen-color-row">
              <input type="color" formControlName="labelFontColor" class="gen-color-input">
              <span class="gen-color-hint">Click to pick</span>
            </div>
          </div>

          <div class="gen-field">
            <label class="gen-label">Background Color</label>
            <div class="gen-color-row">
              <input type="color" formControlName="backgroundColor" class="gen-color-input">
              <span class="gen-color-hint">Click to pick</span>
            </div>
          </div>

          <div class="gen-field">
            <label class="gen-label">Layout Type</label>
            <ejs-dropdownlist [dataSource]="layoutOptions" [fields]="ddlFields"
              formControlName="layout" placeholder="Select" class="gen-dropdown"></ejs-dropdownlist>
          </div>

          <div class="gen-field">
            <label class="gen-label">Select Icon</label>
            <ejs-dropdownlist #icon id="icons" formControlName="icon"
              [dataSource]="panelTypeDataArray" [fields]="iconFields"
              placeholder="Select type" class="gen-dropdown"></ejs-dropdownlist>
          </div>

          <div class="gen-field">
            <label class="gen-label">Icon Color</label>
            <div class="gen-color-row">
              <input type="color" formControlName="iconColor" class="gen-color-input">
              <span class="gen-color-hint">Click to pick</span>
            </div>
          </div>

          <div class="gen-field">
            <label class="gen-label">Icon FontSize</label>
            <input type="number" formControlName="iconFontSize" class="gen-input">
          </div>

        </div>

      </form>
    </div>
  </div><!-- end pt-tab-content -->
</div><!-- end pt-tab-shell -->
