<div class="control-section" id="wrapper">
    <!-- main content declaration -->
    <div>
        <ejs-toolbar cssClass="dockToolbar" id="dockToolbar" (clicked)="toolbarCliked($event)">
            <e-items>
                <e-item prefixIcon="bi bi-chevron-left" tooltipText="back" (click)="onreturnBack()">
                    <i class="bi bi-chevron-left"></i>
                </e-item>
                <e-item>
                    <ng-template #template>
                        <div class="e-folder">
                            <div class="e-folder-name">Profile Settings</div>
                        </div>
                    </ng-template>
                </e-item>
            </e-items>
        </ejs-toolbar>
    </div>
    <div id="main-content container-fluid col-md-12" class="dockmaincontent">
        <div>
            <div id="dockContent" class="dockcontent">
                <!-- <app-loader></app-loader> -->
            
                <router-outlet> 
                        
                </router-outlet>

                <app-popup></app-popup>  

            </div>

      
        </div>
    </div>
    <!-- sidebar component -->
    <ejs-sidebar id="dockSidebar" #dockBar class="dockSidebar" width="220px" dockSize="60px" target=".dockmaincontent"
        [enableDock]='enableDock' type="Auto">
        <ejs-listview id="dockList" [dataSource]='ListData' cssClass="e-template-list" [showIcon]='showIcon'
            [fields]='listFields' (select)="onSelect($event)">
        </ejs-listview>
    </ejs-sidebar>
</div>
