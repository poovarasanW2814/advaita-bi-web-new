<div class="control-section">
  <div class="containers">
    <div class="row">
      <div class="col-md-12">
        <h3 class=" popupHeader tableTitle">
          Dashboard Rearrange    
              <span class="text-danger" style="font-size: 12px;">
               ( * Drag & Drop to rearrange )
            </span>
        </h3>


       
      </div>

      <div class="col-md-12 " style="min-height: 450px">
        <div id="drag-drop-wrapper wrapborder">
          <div class="listbox-control">
            <div class="submitBtn" style="margin-bottom:10px">
 

              <!-- <button class="non-mobile-button e-btn e-btn-purple" *ngIf="isRoleSuperadmin == 'superadmin'"
                (select)="onDbSelect($event)" style="margin-right:10px; cursor: pointer;" [content]="'Select'"
                ejs-dropdownbutton [items]='items' iconCss="bi bi-database"></button> -->

                <button class="e-btn e-btn-purple" style="cursor: pointer; margin-right:10px"
               *ngIf="isSuperadmin || groupPermissionObj?.can_create || groupPermissionObj?.can_update" (click)="openGroupingModal()"
               ejs-button>+ Group </button> 


              <button class="e-btn e-btn-purple" *ngIf="isSuperadmin || permissionObj?.can_create || permissionObj?.can_update"
                (click)="dialogBtnClick()" style="margin-right:5px; cursor: pointer" ejs-button>+ Setup</button>

              <button class="e-btn e-btn-purple" style="cursor: pointer"
                *ngIf="isSuperadmin || permissionObj?.can_create || permissionObj?.can_update" (click)="onDashboardRearrange()"
                ejs-button>Save</button>

            </div>


            <ejs-listbox #listbox1 [dataSource]='dashboardDataList' [fields]="fields" [allowDragAndDrop]='true'
              height='540px' itemTemplate='<div class="list-wrapper row" >
            <div class="col-md-12"> <div class="displyInfo" style="background-image: ${ backgroundColor };padding: 8px; text-align:center; height:89px">  <p class="dashboard_name">${ dashboard_name}</p>
              <p class="description">${description}</p> </div>

            </div>

          </div>' (dragStart)='onDragStart($event)' (drop)='onDrop($event)' (drag)="onDrag($event)">
            </ejs-listbox>


          </div>
        </div>

      </div>

    </div>
  </div>

  @if (showSetupDialog) {
  <div class="cd-modal-backdrop" (click)="showSetupDialog = false"></div>
  <div class="cd-modal cd-modal-sm">
    <div class="cd-modal-header">
      <div class="cd-modal-header-icon"><i class="bi bi-gear"></i></div>
      <h3 class="cd-modal-title">{{ dialogHeader }}</h3>
      <button class="cd-modal-close" type="button" (click)="showSetupDialog = false" aria-label="Close"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="cd-modal-body">
      <form action="" [formGroup]="dashboardSetupForm" (submit)="createDashboardSetup()">
        <div class="form-group">
          <label for="userName">UserName <span class="cd-req">*</span></label>
          <select name="" class="form-control" id="" formControlName="user_id">
            <option value="">Select User</option>
            <option value="" *ngFor="let user of usersArray" [value]="user.user_id">{{user.username}}</option>
          </select>
        </div>
        <div class="form-group">
          <label for="display_type">Display Type <span class="cd-req">*</span></label>
          <select name="" id="" class="form-control" formControlName="display_type">
            <option value="">Select</option>
            <option value="card">Card</option>
            <option value="list">List</option>
            <option value="Grouped">Group</option>
          </select>
        </div>
        <div class="form-group">
          <label for="show_image" style="display:block">Show Image <span class="cd-req">*</span></label>
          <ejs-switch formControlName="show_image" cssClass="bar-color" style="margin-left:10px"></ejs-switch>
        </div>
        <div class="cd-modal-footer-inline" style="margin-top:8px">
          <button class="cd-btn cd-btn-sm cd-btn-primary" *ngIf="submitFlag">Create</button>
          <button class="cd-btn cd-btn-sm cd-btn-primary" type="button" *ngIf="updateFlag" (click)="updateDashboardSetup()">Update</button>
        </div>
      </form>
    </div>
  </div>
  }

  @if (showGroupingDialog) {
  <div class="cd-modal-backdrop" (click)="showGroupingDialog = false"></div>
  <div class="cd-modal cd-modal-md">
    <div class="cd-modal-header">
      <div class="cd-modal-header-icon"><i class="bi bi-collection"></i></div>
      <h3 class="cd-modal-title">Add Grouping</h3>
      <button class="cd-modal-close" type="button" (click)="showGroupingDialog = false" aria-label="Close"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="cd-modal-body">
      <form [formGroup]="groupForm">
        <div class="form-group">
          <label>Select Group Name <span class="cd-req">*</span></label>
          <ejs-dropdownlist formControlName="groupName" id="groupName" [dataSource]="groupNames"
            [placeholder]="'Select Group Name'" (change)="onGroupChange($event)"
            [fields]="{ text: 'name', value: 'name'}">
          </ejs-dropdownlist>
        </div>
        <div class="form-group" *ngIf="isCustomGroup">
          <label>Enter New Group Name <span class="cd-req">*</span></label>
          <input type="text" class="form-control" formControlName="customGroupName" placeholder="Enter new group name" />
        </div>
        <div class="form-group">
          <label>Grouped Dashboard Name <span class="cd-req">*</span></label>
          <ejs-multiselect id='multiselect-checkbox' #checkbox [dataSource]='dashboardDataList' [enableSelectionOrder]='false'
            [fields]="{ text: 'dashboard_name', value: 'dashboard_id', groupBy: 'groupName' }"
            [showDropDownIcon]='true' [mode]="'CheckBox'" showSelectAll='true' [enableGroupCheckBox]='true'></ejs-multiselect>
        </div>
        <div class="form-group">
          <label>Dashboard Name <span class="cd-req">*</span></label>
          <ejs-multiselect [dataSource]="dashboardDataList" formControlName="dashboardNames" class="multiSelectField"
            [fields]="{ text: 'dashboard_name', value: 'dashboard_id' }" [placeholder]="'Select Dashboard Name'"
            [showDropDownIcon]='true' mode="CheckBox"></ejs-multiselect>
        </div>
      </form>
    </div>
    <div class="cd-modal-footer-inline">
      <button class="cd-btn cd-btn-sm cd-btn-primary" (click)="onSubmit()">Group</button>
      <button class="cd-btn cd-btn-sm cd-btn-ghost" style="margin-left:5px" (click)="onSubmit()">UnGroup</button>
    </div>
  </div>
  }


</div>
