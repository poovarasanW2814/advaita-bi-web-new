<div class="">
  <div class="formDiv">
    <!-- <div>
    <h3>
      User Based Acess
    </h3>
  </div> -->

  <form [formGroup]="permissionForm" (ngSubmit)="onFormSubmit()">

    <div class="row">
      <div class="col-md-5" style="padding-left:0px">
        @if (userAccessObj) {
          <label for="roleName">Role Name : <span>{{userAccessObj.role}}</span> </label>
        }
        <!-- <input type="text" class="form-control" formControlName="roleName"> -->
        <!--
        <select name="" id="" class="form-control" formControlName="roleName">
          <option value="">Select</option>
          <option value="item.role"  *ngFor="let item of rolesArray">{{item.role}}</option>
        </select> -->
      </div>
      <div class="col-md-5" style="padding-left:0px">
        <!-- <label for="roleName">Select User</label> -->
        @if (userAccessObj) {
          <label for="roleName">User Name : <span>{{userAccessObj.username}}</span> </label>
        }

        <!-- <input type="text" class="form-control" formControlName="roleName"> -->

        <!-- <select name="" id="" class="form-control" formControlName="username">
        <option value="">Select</option>
        <option value="item.username"  *ngFor="let item of usersArray">{{item.username}}</option>
      </select> -->
    </div>
  </div>


  <br>

    <div formGroupName="permissions" style="border: 1px solid #e0e0e0; border-radius: 8px;">
      <table style="width:100%; border-collapse: collapse;">
        <thead>
          <tr style="background-color: #f0f0f0; position: sticky; top: 0; z-index: 1;">
            <th style="padding: 10px 14px; text-align: left; font-size: 13px; font-weight: 600; width: 34%;">Form Name</th>
            <th style="padding: 10px 8px; text-align: center; font-size: 13px; font-weight: 600; width: 12%;">Select All</th>
            <th style="padding: 10px 8px; text-align: center; font-size: 13px; font-weight: 600; width: 11%;">View</th>
            <th style="padding: 10px 8px; text-align: center; font-size: 13px; font-weight: 600; width: 11%;">Create</th>
            <th style="padding: 10px 8px; text-align: center; font-size: 13px; font-weight: 600; width: 11%;">Update</th>
            <th style="padding: 10px 8px; text-align: center; font-size: 13px; font-weight: 600; width: 11%;">Delete</th>
          </tr>
        </thead>
        <tbody>
          @for (permission of permissionRows; track permission) {
            <tr style="border-top: 1px solid #f0f0f0;">
              <td style="padding: 8px 14px; font-size: 13px;">{{ permission.label }}</td>
              <td style="padding: 8px; text-align: center;">
                <div formGroupName="{{ permission.key }}">
                  <input type="checkbox" style="cursor:pointer; width:16px; height:16px;" class="selectBox"
                    formControlName="selectAll"
                    (change)="toggleAllPermissions(permission.key,$event)" />
                </div>
              </td>
              <td style="padding: 8px; text-align: center;">
                <div formGroupName="{{ permission.key }}">
                  <input type="checkbox" style="cursor:pointer; width:16px; height:16px;" formControlName="view" />
                </div>
              </td>
              <td style="padding: 8px; text-align: center;">
                <div formGroupName="{{ permission.key }}">
                  <input type="checkbox" style="cursor:pointer; width:16px; height:16px;" formControlName="create" />
                </div>
              </td>
              <td style="padding: 8px; text-align: center;">
                <div formGroupName="{{ permission.key }}">
                  <input type="checkbox" style="cursor:pointer; width:16px; height:16px;" formControlName="update" />
                </div>
              </td>
              <td style="padding: 8px; text-align: center;">
                <div formGroupName="{{ permission.key }}">
                  <input type="checkbox" style="cursor:pointer; width:16px; height:16px;" formControlName="delete" />
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>

  <!-- <div style="text-align: right; margin-top:10px">
  <button class="e-btn e-info" ejs-button>
    Submit
  </button>

</div> -->
</form>


</div>
</div>
