<div class="profile-page">
  <div class="profile-card">
    <div class="cover-section">
      <div class="background-container">
        <img [src]="backgroundImage" alt="Background" class="background-image">
      </div>
      
      <div class="profile-info">
        <div class="profile-image-container">
          <label for="profile-image-input" class="profile-image-label">
            <img [src]="profileImage" alt="Profile" class="profile-avatar">
            <!-- <div class="profile-image-overlay" *ngIf="isEditMode">
              <span>Change Photo</span>
            </div> -->
          </label>
          <!-- <input 
            type="file" 
            id="profile-image-input" 
            (change)="onProfileImageChange($event)"
            accept="image/*"
            class="hidden"> -->
        </div>
        <div class="profile-details">
          <h2 class="profile-name">{{userData.username}} </h2>
          <p class="profile-email">{{userData.email}}</p>
        </div>
        <button class="e-btn e-btn-purple" type="button" (click)="toggleEditMode()">
          {{isEditMode ? 'Cancel' : 'Edit'}}
        </button>

        <div class="form-actions" *ngIf="isEditMode" style="margin-left: 10px;"> 

          <button type="submit" class="e-btn e-btn-purple" (click)="onSubmit()" >
            Update Profile
          </button>
        </div>

      </div>
    </div>

    <!-- <br> -->

    <div class="profile-content">
      <form [formGroup]="profileForm"  class="profile-form">
        <div class="form-row">
          <div class="form-group">
            <label>User Name</label>
            <input 
              type="text"
              formControlName="username"
              class="form-input disabled"
             
              placeholder="Enter username">
          </div>

          <div class="form-group">
            <label>First Name</label>
            <input 
              type="text"
              formControlName="first_name"
              class="form-input"
              [class.disabled]="!isEditMode"
              placeholder="Enter first name">
            <div *ngIf="profileForm.get('first_name')?.touched && profileForm.get('first_name')?.errors?.['required']" 
                 class="error-message">
              First name is required
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Last Name</label>
            <input 
              type="text"
              formControlName="last_name"
              class="form-input"
              [class.disabled]="!isEditMode"
              placeholder="Enter last name">
            <div *ngIf="profileForm.get('last_name')?.touched && profileForm.get('last_name')?.errors?.['required']" 
                 class="error-message">
              Last name is required
            </div>
          </div>

          <div class="form-group">
            <label>Role</label>
            <input 
              type="text"
              formControlName="role"
              class="form-input"
              [class.disabled]="!isEditMode"
              placeholder="Enter role">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Email</label>
            <input 
              type="email"
              formControlName="email"
              class="form-input disabled"
              placeholder="Enter email">
            <div *ngIf="profileForm.get('email')?.touched && profileForm.get('email')?.errors?.['required']" 
                 class="error-message">
              Email is required
            </div>
            <div *ngIf="profileForm.get('email')?.touched && profileForm.get('email')?.errors?.['email']" 
                 class="error-message">
              Please enter a valid email address
            </div>
          </div>
        </div>


      </form>
    </div>
  </div>
</div>
