<div class="pm-root">
  <form [formGroup]="permissionForm" (ngSubmit)="onFormSubmit()">
    <!-- Info bar -->
    <div class="pm-info-bar">
      @if (userAccessObj) {
        <span class="pm-info-item"><strong>Role Name :</strong> {{ userAccessObj.role }}</span>
        <span class="pm-info-item"><strong>User Name :</strong> {{ userAccessObj.username }}</span>
      }
    </div>

    <!-- Permission cards -->
    <div class="pm-cards" formGroupName="permissions">
      @for (permission of permissionRows; track permission) {
        <div class="pm-card" [formGroupName]="permission.key">
          <div class="pm-card-left">
            <div class="pm-card-icon">
              <i class="bi bi-ui-checks-grid"></i>
            </div>
            <span class="pm-card-name" [title]="permission.label">{{ permission.label }}</span>
          </div>
          <div class="pm-chip-row">
            <!-- Select All -->
            <label class="pm-chip-wrap">
              <input type="checkbox" hidden formControlName="selectAll"
                (change)="toggleAllPermissions(permission.key, $event)">
              <span class="pm-chip"
                [class.on]="permissionForm.get('permissions.' + permission.key + '.selectAll')?.value"
                [class.off]="!permissionForm.get('permissions.' + permission.key + '.selectAll')?.value"
                [class.a]="true">
                <i class="bi bi-check2-all"></i> All
              </span>
            </label>
            <!-- View -->
            <label class="pm-chip-wrap">
              <input type="checkbox" hidden formControlName="view">
              <span class="pm-chip"
                [class.on]="permissionForm.get('permissions.' + permission.key + '.view')?.value"
                [class.off]="!permissionForm.get('permissions.' + permission.key + '.view')?.value"
                [class.v]="true">
                <i class="bi bi-eye"></i> View
              </span>
            </label>
            <!-- Create -->
            <label class="pm-chip-wrap">
              <input type="checkbox" hidden formControlName="create">
              <span class="pm-chip"
                [class.on]="permissionForm.get('permissions.' + permission.key + '.create')?.value"
                [class.off]="!permissionForm.get('permissions.' + permission.key + '.create')?.value"
                [class.c]="true">
                <i class="bi bi-plus-lg"></i> Create
              </span>
            </label>
            <!-- Update -->
            <label class="pm-chip-wrap">
              <input type="checkbox" hidden formControlName="update">
              <span class="pm-chip"
                [class.on]="permissionForm.get('permissions.' + permission.key + '.update')?.value"
                [class.off]="!permissionForm.get('permissions.' + permission.key + '.update')?.value"
                [class.u]="true">
                <i class="bi bi-pencil"></i> Update
              </span>
            </label>
            <!-- Delete -->
            <label class="pm-chip-wrap">
              <input type="checkbox" hidden formControlName="delete">
              <span class="pm-chip"
                [class.on]="permissionForm.get('permissions.' + permission.key + '.delete')?.value"
                [class.off]="!permissionForm.get('permissions.' + permission.key + '.delete')?.value"
                [class.d]="true">
                <i class="bi bi-trash3"></i> Delete
              </span>
            </label>
          </div>
        </div>
      }
    </div>
  </form>
</div>
