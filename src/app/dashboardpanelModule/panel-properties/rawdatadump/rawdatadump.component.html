<div class="pt-tab-shell">

  <!-- Sidebar nav -->
  <nav class="pt-tab-nav">
    <span class="pt-nav-label">Configuration</span>
    <button type="button" class="pt-nav-item" [class.pt-nav-active]="activeTab === 0" (click)="selectTab(0)">
      <span class="pt-nav-num">1</span>
      <span class="pt-nav-text">General</span>
    </button>
    <button type="button" class="pt-nav-item" [class.pt-nav-active]="activeTab === 1" (click)="selectTab(1)">
      <span class="pt-nav-num">2</span>
      <span class="pt-nav-text">Raw Query</span>
    </button>
    <button type="button" class="pt-nav-item" [class.pt-nav-active]="activeTab === 2" (click)="selectTab(2)">
      <span class="pt-nav-num">3</span>
      <span class="pt-nav-text">Last Refresh</span>
    </button>
  </nav>

  <!-- Content panels -->
  <div class="pt-tab-content">

    <!-- ── Tab 1: General ───────────────────────────────────────── -->
    <div class="pt-tab-pane" [class.pt-tab-active]="activeTab === 0">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <div class="gen-grid">

          <div class="gen-field">
            <label class="gen-label">Table Name</label>
            <ejs-dropdownlist [dataSource]="tableNamesArray" [allowFiltering]="true"
              formControlName="tableName" (change)="onTableDropdown(tableDropdown.value)"
              #tableDropdown class="gen-dropdown"></ejs-dropdownlist>
            <span class="gen-error"
              *ngIf="form.get('tableName')?.invalid && form.get('tableName')?.touched">
              Table Name is required.
            </span>
          </div>

          <div class="gen-field">
            <label class="gen-label">Label Name</label>
            <input type="text" formControlName="labelName" class="gen-input">
          </div>

          <div class="gen-field">
            <label class="gen-label">Label Fontsize</label>
            <input type="number" formControlName="textSize" class="gen-input">
          </div>

          <div class="gen-field">
            <label class="gen-label">Background Color</label>
            <div class="gen-color-row">
              <input type="color" formControlName="backgroundColor" class="gen-color-input">
              <span class="gen-color-hint">Click to pick</span>
            </div>
          </div>

          <div class="gen-field">
            <label class="gen-label">Text Color</label>
            <div class="gen-color-row">
              <input type="color" formControlName="textColor" class="gen-color-input">
              <span class="gen-color-hint">Click to pick</span>
            </div>
          </div>

        </div>

      </form>
    </div>

    <!-- ── Tab 2: Raw Query ─────────────────────────────────────── -->
    <div class="pt-tab-pane pt-tab-pane--flex" [class.pt-tab-active]="activeTab === 1">
      <form [formGroup]="form" class="cond-form">

        <div class="cond-builder-row">

          <!-- Left: Raw Query -->
          <div class="cond-left">
            <div class="cond-legend-bar">
              <span class="gen-sub-label">Raw Query</span>
              <div style="display:flex; gap:6px; align-items:center;">
                <button type="button" (click)="onCopyRawQuery()" class="cond-clear-btn">Copy</button>
                <span *ngIf="copyMessage" class="rq-copy-toast">{{ copyMessage }}</span>
                <button type="button" (click)="onClearRawQuery()" class="cond-clear-btn">Clear</button>
              </div>
            </div>
            <textarea name="rawQuery" rows="5" class="cond-textarea"
              formControlName="rawQuery"
              [(ngModel)]="rawQueryValue"
              (click)="updateCursorPosition($event)"
              (input)="updateCursorPosition($event)"></textarea>
            <div class="cond-operators">
              <button type="button" class="e-btn e-btn-purple oper" (click)="addRawQueryText($event)" value="+">+</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addRawQueryText($event)" value="-">-</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addRawQueryText($event)" value="*">*</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addRawQueryText($event)" value="/">/</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addRawQueryText($event)" value="==">==</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addRawQueryText($event)" value="<">&lt;</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addRawQueryText($event)" value="<=">&lt;=</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addRawQueryText($event)" value="!=">!=</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addRawQueryText($event)" value=">=">&gt;=</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addRawQueryText($event)" value=">">&gt;</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addRawQueryText($event)" value="and">and</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addRawQueryText($event)" value="or">or</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addRawQueryText($event)" value="not">not</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addRawQueryText($event)" value="(">(</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addRawQueryText($event)" value=")">)</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addRawQueryText($event)" value="{apply_filters}">Apply_Filters</button>
            </div>
          </div>

          <!-- Right: Field list -->
          <div class="cond-right">
            <div class="cond-field-list-header">Selected Table Field Names</div>
            <ul class="cond-field-list">
              <li *ngFor="let name of selectedTableFieldName" (click)="addToTextarea(name)">{{ name }}</li>
            </ul>
          </div>

        </div>

      </form>
    </div>

    <!-- ── Tab 3: Last Refresh ──────────────────────────────────── -->
    <div class="pt-tab-pane pt-tab-pane--flex" [class.pt-tab-active]="activeTab === 2">
      <form [formGroup]="form" class="cond-form">

        <div class="cond-builder-row">

          <!-- Left: Last DataRefresh Query -->
          <div class="cond-left">
            <div class="cond-legend-bar">
              <span class="gen-sub-label">Last DataRefresh Query</span>
              <button type="button" (click)="onClearLastDataRefreshQuery()" class="cond-clear-btn">Clear</button>
            </div>
            <textarea name="lastDataRefreshQuery" rows="5" class="cond-textarea"
              formControlName="lastDataRefreshQuery"
              [(ngModel)]="lastRefreshDataQuery"
              (click)="updateCursorPositionCondition($event)"
              (input)="updateCursorPositionCondition($event)"></textarea>
            <div class="cond-operators">
              <button type="button" class="e-btn e-btn-purple oper" (click)="addLastRefreshQueryText($event)" value="+">+</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addLastRefreshQueryText($event)" value="-">-</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addLastRefreshQueryText($event)" value="*">*</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addLastRefreshQueryText($event)" value="/">/</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addLastRefreshQueryText($event)" value="==">==</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addLastRefreshQueryText($event)" value="<">&lt;</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addLastRefreshQueryText($event)" value="<=">&lt;=</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addLastRefreshQueryText($event)" value="!=">!=</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addLastRefreshQueryText($event)" value=">=">&gt;=</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addLastRefreshQueryText($event)" value=">">&gt;</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addLastRefreshQueryText($event)" value="and">and</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addLastRefreshQueryText($event)" value="or">or</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addLastRefreshQueryText($event)" value="not">not</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addLastRefreshQueryText($event)" value="(">(</button>
              <button type="button" class="e-btn e-btn-purple oper" (click)="addLastRefreshQueryText($event)" value=")">)</button>
            </div>
          </div>

          <!-- Right: Field list -->
          <div class="cond-right">
            <div class="cond-field-list-header">Selected Table Field Names</div>
            <ul class="cond-field-list">
              <li *ngFor="let name of selectedTableFieldName" (click)="addToRefreshTExtArea(name)">{{ name }}</li>
            </ul>
          </div>

        </div>

      </form>
    </div>

  </div><!-- end pt-tab-content -->
</div><!-- end pt-tab-shell -->
