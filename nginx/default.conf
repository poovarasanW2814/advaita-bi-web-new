server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Angular routing fallback (important for single-page apps like Angular)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets caching (adjust if necessary for your assets)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Ensure that no /api block is used (since you already call the API directly in the frontend)
    # No proxying here, as the frontend app already uses the full API URL (https://test-api.syntheta.net/)
    
    # Logging for debugging (optional)
    error_log /var/log/nginx/error.log debug;
}
