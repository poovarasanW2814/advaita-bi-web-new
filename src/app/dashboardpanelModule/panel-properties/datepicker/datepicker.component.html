<div class="pt-tab-shell">

  <!-- Sidebar nav -->
  <nav class="pt-tab-nav">
    <span class="pt-nav-label">Configuration</span>
    <button type="button" class="pt-nav-item" [class.pt-nav-active]="activeTab === 0" (click)="selectTab(0)">
      <span class="pt-nav-num">1</span><span class="pt-nav-text">General</span>
    </button>
  </nav>

  <!-- Content panels -->
  <div class="pt-tab-content">

    <!-- Tab 1: General -->
    <div class="pt-tab-pane" [class.pt-tab-active]="activeTab === 0">
      <form [formGroup]="boxTemplateForm" (ngSubmit)="onBoxFormSubmit()">
        <div class="gen-grid" style="grid-template-columns: repeat(4, 1fr);">
          <div class="gen-field">
            <label class="gen-label">Table Name <span class="gen-req">*</span></label>
            <ejs-dropdownlist [dataSource]="tableNamesArray" [allowFiltering]="true"
              formControlName="tableName" (change)="onTableDropdown(tableDropdown.value)"
              #tableDropdown class="gen-dropdown"></ejs-dropdownlist>
          </div>
          <div class="gen-field">
            <label class="gen-label">Field Name <span class="gen-req">*</span></label>
            <ejs-dropdownlist [dataSource]="selectedTableFieldName" [allowFiltering]="true"
              formControlName="fieldName" (change)="onSecondDropdownChange(fieldNameDropdown.value)"
              #fieldNameDropdown class="gen-dropdown"></ejs-dropdownlist>
          </div>
          <div class="gen-field">
            <label class="gen-label">Label Name</label>
            <input type="text" formControlName="labelName" class="gen-input">
          </div>
          <div class="gen-field">
            <label class="gen-label">Date Format <span class="gen-req">*</span></label>
            <ejs-dropdownlist [dataSource]="formatData" formControlName="dateFormat"
              placeholder="Select Format" class="gen-dropdown"></ejs-dropdownlist>
          </div>
        </div>
      </form>
    </div>

  </div><!-- end pt-tab-content -->
</div><!-- end pt-tab-shell -->
